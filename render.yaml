services:
  - type: web
    name: yom-sales-system
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: yom-sales-db
          property: connectionString

databases:
  - name: yom-sales-db
    databaseName: yom_sales
    user: yom_user
    plan: free
